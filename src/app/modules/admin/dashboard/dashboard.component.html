<section class="p-4 w-full">
    <div class="grid gap-3 grid-cols-1 lg:grid-cols-3">
        <div class="col-span-1 grid grid-rows-2 gap-3">
            <div class="bg-card shadow rounded-xl flex justify-start items-center p-4 flex flex-col">
                <div class="w-full flex items-center my-2">
                    <mat-icon [svgIcon]="'heroicons_outline:chart-pie'" class="text-[#EFDF00] mr-1"></mat-icon>
                    <h2 class="text-lg md:text-xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate text-left">
                        Región
                    </h2>
                </div>
                <div>
                    <mat-chip-list aria-label="Fish selection">
                        <mat-chip>Región comercial 1</mat-chip>
                        <mat-chip>Región comercial 2</mat-chip>
                        <mat-chip>Región comercial 3</mat-chip>
                        <mat-chip>Región comercial 4</mat-chip>
                      </mat-chip-list>
                </div>
            </div>
            <div class="bg-card shadow rounded-xl flex justify-start items-center p-4 flex-col">
                <div class="w-full flex items-center my-2">
                    <mat-icon [svgIcon]="'heroicons_outline:chart-pie'" class="text-[#EFDF00] mr-1"></mat-icon>
                    <h2 class="text-lg md:text-xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate text-left">
                        Zona
                    </h2>
                </div>
                <div>
                    <mat-chip-list aria-label="Fish selection">
                        <mat-chip>Zona1</mat-chip>
                        <mat-chip>Zona2</mat-chip>
                        <mat-chip>Zona3</mat-chip>
                        <mat-chip>Zona4</mat-chip>
                        <mat-chip>Zona5</mat-chip>
                        <mat-chip>Zona6</mat-chip>
                        <mat-chip>Zona7</mat-chip>
                        <mat-chip>Zona8</mat-chip>
                    </mat-chip-list>
                </div> 
            </div>
        </div>
        <div class="col-span-2">
            <div class="w-full bg-[#D9D9D6] shadow-md p-2 rounded-2xl">
                <apx-chart
                  [series]="chartOptions.series"
                  [chart]="chartOptions.chart"
                  [dataLabels]="chartOptions.dataLabels"
                  [plotOptions]="chartOptions.plotOptions"
                  [yaxis]="chartOptions.yaxis"
                  [xaxis]="chartOptions.xaxis"
                  [fill]="chartOptions.fill"
                  [title]="chartOptions.title"
                ></apx-chart>
            </div>
        </div>
    </div>
</section>
